<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Экзамен</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Экран PIN -->
  <div id="pin-overlay">
    <h1>Введите PIN</h1>
    <input type="tel" inputmode="numeric" maxlength="4" id="pin-input" placeholder="••••" autocomplete="off">
    <button id="pin-btn">Войти</button>
    <p id="pin-error"></p>
  </div>

  <!-- Выбор темы -->
  <main id="topic-select" class="hidden" style="text-align: center; padding-top: 40px;">
    <h1>Выберите тему</h1>
    <div id="topics-container"></div>
  </main>

  <!-- Интерфейс теста -->
  <header id="quiz-header" class="hidden">
    <button id="back-to-topics-header-btn" class="header-btn">← Темы</button>
    <span id="counter">1 / 10</span>
    <span id="live-stats" class="live-stats">✅ 0 | ❌ 0</span>
  </header>
  <main id="quiz-main" class="hidden">
    <div class="card">
      <h2 id="question"></h2>
      <div id="options" class="options"></div>
      <p id="feedback"></p>
    </div>
  </main>
  <footer id="quiz-footer" class="hidden">
    <button id="prev-btn" class="nav-btn" disabled>← Назад</button>
    <button id="next-btn" class="nav-btn">Далее →</button>
  </footer>

  <!-- Экран результатов -->
  <main id="results-screen" class="hidden" style="text-align: center; padding-top: 40px;">
    <h1>Результаты теста</h1>
    <div class="results-stats">
      <p>✅ Правильных: <b id="res-correct">0</b></p>
      <p>❌ Неправильных: <b id="res-wrong">0</b></p>
      <p>📝 Всего вопросов: <b id="res-total">0</b></p>
    </div>
    <button id="back-to-topics-btn" class="nav-btn" style="max-width: 300px; margin: 0 auto;">К выбору тем</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
