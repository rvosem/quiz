<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Экзамен</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PIN Ввод -->
  <div id="pin-overlay">
    <h1>Введите PIN</h1>
    <input type="tel" inputmode="numeric" maxlength="4" id="pin-input" placeholder="••••">
    <button id="pin-btn">Войти</button>
    <p id="pin-error"></p>
  </div>

  <!-- Выбор темы -->
  <main id="topic-select" class="hidden" style="text-align: center; padding-top: 40px;">
    <h1>Выберите тему</h1>
    <div id="topics-container" style="margin-top: 24px;"></div>
  </main>

  <!-- Тест -->
  <header id="quiz-header" class="hidden"><span id="counter"></span></header>
  <main id="quiz-main" class="hidden">
    <div class="card">
      <h2 id="question"></h2>
      <div id="options" class="options"></div>
      <p id="feedback"></p>
    </div>
  </main>
  <footer id="quiz-footer" class="hidden">
    <button id="prev-btn" class="nav-btn" disabled>← Назад</button>
    <button id="next-btn" class="nav-btn">Далее →</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
